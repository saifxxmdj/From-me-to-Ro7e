<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>I love you 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background: linear-gradient(135deg,#4A0E0E,#800020,#4A0E0E);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* FLOATING HEARTS */
.floats-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
}

.float-item {
    position: absolute;
    bottom: -80px;
    animation: floatUp 12s infinite linear;
    opacity: 0;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(-120vh); opacity: 0; }
}

/* MAIN */
.login-container {
    position: relative;
    z-index: 2;
    text-align: center;
}

/* HEART */
.heart-container {
    position: relative;
    width: 500px;
    height: 500px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.big-heart {
    font-size: 450px;
    animation: beat 2s infinite;
}

.big-heart::before {
    content: "❤️";
}

@keyframes beat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
}

/* CONTENT */
.login-content {
    position:absolute;
    width:60%;
    text-align:center;
}

/* PHOTO */
.photo-circle {
    width:90px;
    height:90px;
    border-radius:50%;
    overflow:hidden;
    margin:0 auto 10px;
    border:3px solid pink;
}

.photo-circle img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* TEXT */
.login-title {
    color:#fff;
    font-size:22px;
    font-weight:900;
}

.login-subtitle {
    color:#ffd1dc;
    margin-bottom:15px;
}

/* INPUT */
input {
    width:80%;
    padding:10px;
    border-radius:10px;
    border:none;
    text-align:center;
    font-size:18px;
    margin-bottom:10px;
}

/* BUTTON */
button {
    width:80%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#ff2d55;
    color:white;
    font-size:18px;
}
</style>
</head>

<body>

<div class="floats-container" id="floats">
    <div class="float-item">❤️</div>
    <div class="float-item">💖</div>
    <div class="float-item">💕</div>
</div>

<div class="login-container">

    <div class="heart-container">
        <div class="big-heart"></div>

        <div class="login-content">

            <div class="photo-circle">
                <img src="https://res.cloudinary.com/dvc3zpg1i/image/upload/v1776553922/clients/evm2tli4mq1khcjsqvpf.jpg">
            </div>

            <div class="login-title">جاهزه😉</div>
            <div class="login-subtitle">my everything ❤</div>

            <input type="password" id="password" placeholder="password">
            <button onclick="checkPassword()">💕 Unlock 💕</button>

        </div>
    </div>
</div>

<script>
const correctPassword = "Maha";

function checkPassword(){
    const pass = document.getElementById("password").value;

    if(pass === correctPassword){
        window.location.href = "index.html";
    } else {
        alert("Wrong password ❌");
    }
}
</script>

</body>
</html>
